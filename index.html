<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Paper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 5px;
        }
        img {
            max-width: 100%;
            /* margin: 10px; */
        }
        .loading {
            font-size: 18px;
            color: blue;
        }
        .heading {
            text-align: center;
        }
                
        .card {
        padding: 1rem;
        border-radius: 0.5rem;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.15);
        background-color: #fff;
        }

        .card-image {
        /* width: 300px; */
        height: 100vw;
        }

        .card-image > img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 0.5rem;
        }

        .card-image > #image {
        width: 100%;
        height: 100vw;
        border-radius: 0.5rem;
        }

        .skeleton-loader {
            animation: skeleton-loader 1s steps(1000) infinite;
            background: linear-gradient(65deg, #eaeaea 0%, #eaeaea 40%, #ffffff 50%, #eaeaea 75%, #eaeaea 100%);
            background-size: 100vw 100vw;
            background-position: 0 0, 0 0, 0 0, 0 0;
        }

        @keyframes skeleton-loader {
            0% {
                background-position: 0 0, 0 0, 0 0, 0 0;
            }
            100% {
                background-position: -500px 0, -500px -200px, 0 -200px, 500px 0;
            }
        }

    </style>
</head>
<body>
    <div style="text-align: center;background: #252424;padding: 12px;margin: -5px -5px 10px -5px;">
        <marquee behavior="scroll" bgcolor="#252424" loop="-1">
            <i>
                <font color="#efefef">
                    <strong>Today's date : <span id="time">25/12/2024, 07:18:15</span></strong>  
                </font>
            </i>
        </marquee>
        <img src="https://www.gujaratsamachar.com/assets/footer-logo.png" alt="Gujarat Samachar" style="margin-top: 10px; width: 200px; color: whitesmoke;">
    </div>
    <div id="skeleton"></div>
    <div id="main" style="display:none;"></div>
    <div id="district" style="display:none;">
        <div style="display: flex;justify-content: space-around;"><h3>Anand-Kheda District</h3><h3>આણંદ ખેડા જિલ્લો        </h3></div>
    </div>
    <div id="magazines" style="display:none;">
        <div style="display: flex;justify-content: space-around;"><h3>Magazines</h3><h3 id="magzName" style="text-transform: capitalize;"></h3></div>
    </div>

    <!-- prefetch status indicator -->
    <div id="prefetchStatus" style="position:fixed;top:70px;right:12px;padding:8px 12px;background:#222;color:#fff;border-radius:6px;display:none;z-index:1000;font-size:13px;"></div>

    <script>
      // register service worker for offline app-shell caching
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js').then(reg => {
          console.log('Service Worker registered', reg);
          // optional: show SW status
          const s = document.createElement('div');
          s.id = 'swStatus';
          s.style = 'position:fixed;bottom:12px;left:12px;background:#111;color:#fff;padding:6px 8px;border-radius:6px;font-size:12px;z-index:9999;';
          s.innerText = 'SW: registered';
          document.body.appendChild(s);
        }).catch(err => {
          console.warn('SW register failed', err);
        });
      }
        window.onbeforeunload = function () {return "";}
        const skeleton = document.getElementById('skeleton');
        for (let index = 1; index < 20; index++) {
            skeleton.innerHTML += '<div class="card"><div class="card-image"><div id="image" class="skeleton-loader"></div></div></div>';
        }

        var today = new Date();
        var day = today.getUTCDay();
        const cardContainer = document.getElementsByClassName("card");
        console.log('day:', day);
        var magazinesList = ['ravipurti', '', 'sahiyar', 'shatdal', 'dharmalok', 'chitralok', 'zagmag', '']; // 0 - 6 : Sunday - Saturday
        var currentPage = 1; // Track the current page
        const main = document.getElementById('main');
        const district = document.getElementById('district');
        const magazines = document.getElementById('magazines');

        var formattedDate = today.toISOString().split('T')[0];
        console.log('Formatted date:', formattedDate);
        for (let index = 1; index < 20; index++) {
            const mainText = document.createElement('b');
            mainText.innerHTML = "Page "+index;
            mainText.id = "mainText-"+index;
            const mainImg = document.createElement('img');
            mainImg.id = "mainImg-"+index;
            mainImg.alt = 'Fetched Image';
            main.appendChild(mainText);
            main.appendChild(mainImg);

            const districtText = document.createElement('b');
            districtText.innerHTML = "Page "+index;
            districtText.id = "districtText-"+index;
            const districtImg = document.createElement('img');
            districtImg.id = "districtImg-"+index;
            districtImg.alt = 'Fetched Image';

            district.appendChild(districtText);
            district.appendChild(districtImg);

            const magazinesText = document.createElement('b');
            magazinesText.innerHTML = "Page "+index;
            magazinesText.id = "magazinesText-"+index;
            const magazinesImg = document.createElement('img');
            magazinesImg.id = "magazinesImg-"+index;
            magazinesImg.alt = 'Fetched Image';

            magazines.appendChild(magazinesText);
            magazines.appendChild(magazinesImg);
        }
        

        function updateDateTime() {
            var d = new Date().toString()
            document.getElementById('time').innerHTML=d.substring(0,24);
        }
        setInterval(updateDateTime, 1000);

        // --- IndexedDB image cache ---
        const IDB_NAME = 'epaper_images_db';
        const IDB_STORE = 'images';
        const CACHE_VALID_KEY = 'epaper_cache_valid_until';

        function openDb() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(IDB_NAME, 1);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbGet(key) {
            try {
                const db = await openDb();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(IDB_STORE, 'readonly');
                    const store = tx.objectStore(IDB_STORE);
                    const r = store.get(key);
                    r.onsuccess = () => resolve(r.result);
                    r.onerror = () => resolve(undefined);
                });
            } catch (e) { return undefined; }
        }

        async function idbPut(key, value) {
            try {
                const db = await openDb();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(IDB_STORE, 'readwrite');
                    const store = tx.objectStore(IDB_STORE);
                    const r = store.put(value, key);
                    r.onsuccess = () => resolve(true);
                    r.onerror = () => resolve(false);
                });
            } catch (e) { return false; }
        }

        function initCacheWindow() {
            const now = new Date();
            const raw = localStorage.getItem(CACHE_VALID_KEY);
            if (raw) {
                const validUntil = parseInt(raw, 10);
                if (!isNaN(validUntil) && now.getTime() < validUntil) {
                    console.log('Using existing IDB cache until', new Date(validUntil));
                    return { cacheValid: true, shouldCreateCache: false };
                }
            }
            // no valid cache
            if (now.getHours() >= 8) {
                const next = new Date(now);
                next.setDate(now.getDate() + 1);
                next.setHours(8,0,0,0);
                localStorage.setItem(CACHE_VALID_KEY, String(next.getTime()));
                console.log('Created new cache window until', next);
                return { cacheValid: true, shouldCreateCache: true };
            }
            return { cacheValid: false, shouldCreateCache: false };
        }

        let cacheState = initCacheWindow();
        let cacheValid = cacheState.cacheValid;
        let shouldCreateCache = cacheState.shouldCreateCache;

        // prefetch into IDB: fetch API for image URLs then blobs
        async function prefetchIntoIDB(types, maxPages=20) {
            if (!navigator.onLine) return;
            const statusEl = document.getElementById('prefetchStatus');
            if (statusEl) { statusEl.style.display='block'; statusEl.innerText='Prefetching...'; }
            let total = 0; types.forEach(t=> total += (t.pageCount||10));
            let done = 0;
            for (const entry of types) {
                const { title, pageCount } = entry;
                for (let i=1;i<=Math.min(maxPages, pageCount||10); i++) {
                    const key = `${title}|${i}|${formattedDate}`;
                    try {
                        // call backend to get image URLs
                        const url = `https://epaper-3q7v.onrender.com/fetch-images?title=${encodeURIComponent(title)}&date=${encodeURIComponent(formattedDate)}&number=${encodeURIComponent(i)}`;
                        const resp = await fetch(url);
                        if (!resp.ok) { done++; if (statusEl) statusEl.innerText=`Prefetch ${done}/${total}`; await new Promise(r=>setTimeout(r,120)); continue; }
                        const imgs = await resp.json();
                        if (!Array.isArray(imgs) || imgs.length===0) { done++; if (statusEl) statusEl.innerText=`Prefetch ${done}/${total}`; await new Promise(r=>setTimeout(r,120)); continue; }
                        // fetch first image blob
                        try {
                            const imgResp = await fetch(imgs[0]);
                            if (imgResp.ok) {
                                const blob = await imgResp.blob();
                                await idbPut(key, blob);
                            }
                        } catch(e) { /* ignore image fetch */ }
                    } catch(e) { /* ignore page */ }
                    done++; if (statusEl) statusEl.innerText=`Prefetch ${done}/${total}`;
                    await new Promise(r=>setTimeout(r,150));
                }
            }
            if (statusEl) { statusEl.innerText='Prefetch complete'; setTimeout(()=>statusEl.style.display='none',1200); }
            // after prefetching, we no longer need to create cache in this session
            shouldCreateCache = false;
        }

        // trigger prefetch on cache creation
        (async function(){
            if (shouldCreateCache && navigator.onLine) {
                const work = [ { title: 'ahmedabad', pageCount: 20 }, { title: 'kheda-anand', pageCount: 10 } ];
                if (magazinesList[day]) work.push({ title: magazinesList[day], pageCount: 10 });
                prefetchIntoIDB(work, 20).catch(e=>console.warn(e));
            }
        })();

        onloadScript();
        async function onloadScript() {
            await loadPages('ahmedabad', 20, 'main');
            await loadPages('kheda-anand', 10, 'district');
            if (magazinesList[day]) {
                document.getElementById('magzName').innerHTML = magazinesList[day];
                await loadPages(magazinesList[day], 10, 'magazines');
            } 
        }

        async function fetchData(i, title, type) {
            try {
                var im = document.getElementById(type+'Img-'+i);
                var t = document.getElementById(type+'Text-'+i);
                if (im) im.style = "display: none;"
                if (t) t.style = "display: none;"

                const key = `${title}|${i}|${formattedDate}`;

                // If the browser is offline, try load from IDB regardless of cache flags
                if (typeof navigator !== 'undefined' && navigator.onLine === false) {
                    const blob = await idbGet(key);
                    if (blob) {
                        const url = URL.createObjectURL(blob);
                        im.src = url;
                        im.style = "text-align: center;display: block;";
                        if (t) t.style = "text-align: center;margin-bottom: -15px;position: relative;display: block;";
                        return;
                    } else {
                        // no cached data for this page — show a small friendly message instead of failing
                        if (t) {
                            t.innerText = 'Offline — page not cached';
                            t.style = 'text-align: center;color:#888;margin-bottom: -15px;display: block;';
                        }
                        return;
                    }
                }

                // If cache valid, try load from IDB and DO NOT call API when not creating cache
                if (cacheValid && !shouldCreateCache) {
                    const blob = await idbGet(key);
                    if (blob) {
                        const url = URL.createObjectURL(blob);
                        im.src = url;
                        im.style = "text-align: center;display: block;";
                        if (t) t.style = "text-align: center;margin-bottom: -15px;position: relative;display: block;";
                        return;
                    } else {
                        // missing in cache: per requirement do not call network
                        return;
                    }
                }

                // Otherwise (no cache or creating cache) call API, fetch image and store if needed
                const apiUrl = `https://epaper-3q7v.onrender.com/fetch-images?title=${encodeURIComponent(title)}&date=${encodeURIComponent(formattedDate)}&number=${encodeURIComponent(i)}`;
                const response = await fetch(apiUrl);
                if (!response.ok) return;
                const images = await response.json();
                if (!Array.isArray(images) || images.length===0) return;

                // fetch first image blob
                try {
                    const imgResp = await fetch(images[0]);
                    if (imgResp.ok) {
                        const blob = await imgResp.blob();
                        // set image using blob
                        const url = URL.createObjectURL(blob);
                        im.src = url;
                        im.style = "text-align: center;display: block;";
                        if (t) t.style = "text-align: center;margin-bottom: -15px;position: relative;display: block;";
                        if (shouldCreateCache) await idbPut(key, blob);
                        return;
                    }
                } catch(e) { /* ignore image fetch error */ }

                // fallback: try using the returned URL directly
                im.src = images[0];
                im.style = "text-align: center;display: block;";
                if (t) t.style = "text-align: center;margin-bottom: -15px;position: relative;display: block;";

            } catch (error) {
                console.error('Error:', error);
            }
        }

        function loadPages(title, pageCount, type) {
            for (let index = 1; index < 20; index++) {
                setTimeout(async () => {
                    await fetchData(index, title, type);
                    console.log('title, pageCount, type:', title, pageCount, type);
                    if (index == 5) {
                        document.querySelectorAll('.card').forEach(e => e.remove());
                        main.style = 'display:block;';
                        district.style = 'display:block;';
                        magazines.style = 'display:block;';
                    }
                }, 500*index);
            }
        }
    </script>
</body>
</html>
